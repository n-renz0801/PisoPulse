<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Expense</title>
  </head>
  <body>
    <h2>Edit Expense</h2>

    <form method="POST">
      <label>Date:</label>
      <input
        type="date"
        name="date"
        value="{{ expense.date.strftime('%Y-%m-%d') }}"
        required
      />

      <label>Amount:</label>
      <input
        type="number"
        step="0.01"
        name="amount"
        value="{{ expense.amount }}"
        required
      />

      <label>Description:</label>
      <textarea name="description" required>{{ expense.description }}</textarea>

      <button type="submit">Update</button>
    </form>

    <a href="/expenses">Cancel</a>
  </body>
</html>
