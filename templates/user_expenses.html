<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/user_expenses.css') }}"
    />
    <title>Users Daily Expenses</title>
  </head>
  <body>
    <header class="header">
      <nav class="nav container">
        <div class="nav__data">
          <div class="nav__logo"><h1 class="website">PisoPulse</h1></div>

          <div class="nav__toggle" id="nav-toggle">
            <span class="nav__burger"><ion-icon name="menu"></ion-icon></span>
            <span class="nav__close"><ion-icon name="close"></ion-icon></span>
          </div>
        </div>

        <div class="nav__menu" id="nav-menu">
          <ul class="nav__list">
            <li><a href="/dashboard" class="nav__link">Dashboard</a></li>

            <li>
              <a href="/user-expenses" class="nav__link">Users</a>
            </li>

            <li>
              <a href="/expenses" class="nav__link">Your Daily Expenses</a>
            </li>
            <li>
              <a href="/logout" class="nav__link">Logout</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <div class="container2">
      <!-- <h1>Your Daily Expenses</h1> -->
      <main class="table" id="customers_table">
        <section class="table__header">
          <button onclick="changeDate(-1)">
            <ion-icon class="date_icon" name="arrow-back"></ion-icon>
          </button>
          <h2 id="current-date" data-date="{{ selected_date_raw }}">
            {{ selected_date_pretty }}
          </h2>
          <button onclick="changeDate(1)">
            <ion-icon class="date_icon" name="arrow-forward"></ion-icon>
          </button>
        </section>

        <div class="add_expense">
          <form method="GET">
            <!-- prettier-ignore -->
            <select class="add_expense_btn" name="user_id" onchange="this.form.submit()">
            <option value="">Select User</option>

            {% for user in users %}
                <option value="{{ user.id }}"
                    {% if selected_user_id == user.id|string %}selected{% endif %}>
                    {{ user.username }}
                </option>
            {% endfor %}
            </select>
          </form>
        </div>

        <section class="table__body">
          <table>
            <colgroup>
              <col style="width: 30%" />
              <col style="width: 70%" />
            </colgroup>
            <thead>
              <tr>
                <th>Amount <span class="icon-arrow">&UpArrow;</span></th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody>
              {% if expenses %} {% for item in expenses %}
              <tr>
                <td>₱{{ "%.2f"|format(item.amount) }}</td>
                <td>{{ item.description }}</td>
              </tr>
              {% endfor %} {% else %}
              <tr>
                <td colspan="2" style="text-align: center">
                  No expenses found
                </td>
              </tr>
              {% endif %}
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script src="{{ url_for('static', filename='js/navbar.js') }}"></script>
    <script>
      function changeDate(offset) {
        const dateEl = document.getElementById("current-date");
        let currentDate = new Date(dateEl.dataset.date);

        currentDate.setDate(currentDate.getDate() + offset);

        const newDate = currentDate.toISOString().split("T")[0];

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get("user_id");

        let url = `/user-expenses?date=${newDate}`;
        if (userId) {
          url += `&user_id=${userId}`;
        }

        window.location.href = url;
      }
    </script>
  </body>
</html>
