<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/add_expense.css') }}"
    />
    <title>Add Expense</title>
  </head>
  <body>
    <div class="container">
      <form class="inside_container" method="POST">
        <div class="top_section">
          <h2>Add Expense</h2>
          <!-- Date -->
          <div class="date-box">
            <span class="icon"
              ><ion-icon name="calendar-clear"></ion-icon
            ></span>
            <input name="date" type="date" value="{{ today }}" required />
            <label>Date:</label>
          </div>

          <!-- <label>Date:</label>
        <input type="date" name="date" value="{{ today }}" required /> -->
          <div class="container2">
            <div id="expenses-container">
              <div class="expense_item">
                <div class="item">
                  <label>Amount:</label>
                  <input type="number" name="amount[]" required />
                </div>

                <div class="item">
                  <label>Description:</label>
                  <textarea name="description[]" required></textarea>
                </div>

                <button
                  class="remove_button"
                  type="button"
                  onclick="this.closest('.expense_item').remove()"
                >
                  <ion-icon name="remove"></ion-icon> Delete
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="outside_button">
          <button class="add_button" type="button" onclick="addExpense()">
            <ion-icon name="add"></ion-icon> Add
          </button>
          <button class="submit_button" type="submit">Save All</button>
          <a class="cancel_button" href="/expenses">Cancel</a>
        </div>
      </form>
    </div>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script src="{{ url_for('static', filename='js/add_expense.js') }}"></script>
  </body>
</html>
